buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        kotlinVersion = "2.1.20"

        // Only pin NDK if explicitly provided by local env.
        // This avoids hard-failing builds when a broken NDK install exists.
        if (project.hasProperty("ANDROID_NDK_VERSION")) {
            def requestedNdkVersion = project.property("ANDROID_NDK_VERSION").toString()
            def androidSdkPath = System.getenv("ANDROID_SDK_ROOT") ?: System.getenv("ANDROID_HOME")
            def ndkSourceProps = androidSdkPath ? file("${androidSdkPath}/ndk/${requestedNdkVersion}/source.properties") : null

            if (ndkSourceProps == null || ndkSourceProps.exists()) {
                ndkVersion = requestedNdkVersion
            } else {
                logger.warn("Skipping ANDROID_NDK_VERSION=${requestedNdkVersion} because source.properties was not found at ${ndkSourceProps}")
            }
        }
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"
